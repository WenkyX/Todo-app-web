<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1916'/%3E%3Crect x='5' y='8' width='6' height='16' rx='2' fill='%23ffffff' opacity='0.9'/%3E%3Crect x='13' y='8' width='6' height='10' rx='2' fill='%23ffffff' opacity='0.55'/%3E%3Crect x='21' y='8' width='6' height='13' rx='2' fill='%23ffffff' opacity='0.3'/%3E%3C/svg%3E">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #ddd9d0;
  --border2: #ccc8be;
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #9b9890;
  --accent: #1a1916;
  --accent-fg: #ffffff;
  --danger: #a32d2d;
  --danger-bg: #fcebeb;
  --danger-border: #f0b0b0;
  --radius: 8px;
  --radius-lg: 12px;
}

[data-theme="dark"] {
  --bg: #18171a;
  --surface: #222125;
  --surface2: #2a292e;
  --border: #38363d;
  --border2: #4a4850;
  --text: #e8e6e3;
  --text2: #a09da8;
  --text3: #6b6874;
  --accent: #e8e6e3;
  --accent-fg: #18171a;
  --danger: #e06c6c;
  --danger-bg: #2e1f1f;
  --danger-border: #6b3030;
}
.dark-toggle {
  font-size: 16px;
  padding: 4px 8px;
  border-color: transparent;
  background: transparent;
  cursor: pointer;
  line-height: 1;
}
.dark-toggle:hover { background: var(--surface2); }


/* Pill toggles */
.pill-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
  color: var(--text3);
  white-space: nowrap;
}
.pill-toggle input[type="checkbox"] { display: none; }
.pill-track {
  width: 28px;
  height: 16px;
  border-radius: 8px;
  background: var(--border2);
  position: relative;
  transition: background 0.15s;
  flex-shrink: 0;
}
.pill-track::after {
  content: '';
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--surface);
  top: 3px;
  left: 3px;
  transition: left 0.15s, background 0.15s;
}
.pill-toggle input:checked + .pill-track { background: var(--accent); }
.pill-toggle input:checked + .pill-track::after { left: 15px; }
.pill-toggle.is-start input:checked + .pill-track { background: #3b82f6; }
.pill-toggle.is-done  input:checked + .pill-track { background: #2e7d4f; }
[data-theme="dark"] .pill-toggle.is-start input:checked + .pill-track { background: #4a9eff; }
[data-theme="dark"] .pill-toggle.is-done  input:checked + .pill-track { background: #5abf80; }
/* Scrollbars */
:root {
  --scrollbar-track: var(--surface2);
  --scrollbar-thumb: var(--border2);
  --scrollbar-thumb-hover: var(--text3);
}
* {
  scrollbar-width: thin;
  scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
}
*::-webkit-scrollbar { width: 6px; height: 6px; }
*::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 3px; }
*::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
*::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
*::-webkit-scrollbar-corner { background: var(--scrollbar-track); }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.spacer { flex: 1; }
button {
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  border-radius: var(--radius);
  padding: 5px 12px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  transition: background 0.1s;
}
button:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.btn-primary:hover { background: #333; border-color: #333; }
.btn-danger { color: var(--danger); border-color: var(--danger-border); background: transparent; }
.btn-danger:hover { background: var(--danger-bg); }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.cat-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
.cat-tab {
  padding: 4px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  border: 1px solid transparent;
  white-space: nowrap;
  color: var(--text2);
  background: transparent;
  transition: all 0.1s;
  font-family: inherit;
}
.cat-tab:hover { background: var(--surface); color: var(--text); }
.cat-tab.active {
  background: var(--surface);
  border-color: var(--border2);
  color: var(--text);
  font-weight: 500;
}
.board {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  overflow-x: auto;
  flex: 1;
  align-items: flex-start;
}
.col {
  background: var(--surface2);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  width: 248px;
  min-width: 248px;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 140px);
}
.col-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.col-title {
  font-size: 13px;
  font-weight: 500;
  flex: 1;
  padding: 2px 4px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: transparent;
  cursor: text;
  color: var(--text);
  font-family: inherit;
}
.col-title:hover { border-color: var(--border); }
.col-title:focus { outline: none; border-color: var(--border2); background: var(--surface); }
.col-count {
  font-size: 11px;
  color: var(--text3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1px 7px;
}
.col-del {
  opacity: 0;
  cursor: pointer;
  font-size: 13px;
  color: var(--text3);
  background: none;
  border: none;
  padding: 2px 5px;
  border-radius: 4px;
  transition: opacity 0.1s;
}
.col-del:hover { color: var(--danger); background: var(--danger-bg); }
.col-header:hover .col-del { opacity: 1; }
.cards {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  flex: 1;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color 0.1s, box-shadow 0.1s;
}
.card:hover { border-color: var(--border2); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card.dragging { opacity: 0.35; }
.cards.is-dragging > .card:not(.dragging) { pointer-events: none; }
.cards.is-dragging > .card-drop-indicator { pointer-events: none; }
.card-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; word-break: break-word; line-height: 1.4; }
.card-meta { display: flex; gap: 8px; font-size: 11px; color: var(--text3); flex-wrap: wrap; margin-top: 4px; }
.card-meta span { display: flex; align-items: center; gap: 3px; }
.card-meta .due-date { color: var(--text3); }
.card-meta .due-date.overdue { color: #c0392b; font-weight: 500; }
[data-theme="dark"] .card-meta .due-date.overdue { color: #e06c6c; }
.card-meta .due-date.done { color: #2e7d4f; font-weight: 500; }
[data-theme="dark"] .card-meta .due-date.done { color: #5abf80; }
.card-meta .due-date.soon { color: #b07d00; font-weight: 500; }
[data-theme="dark"] .card-meta .due-date.soon { color: #e0b840; }
.card-desc-preview {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-height: 1.4;
}
.add-card-btn {
  margin: 0;
  padding: 3px 8px;
  font-size: 12px;
  color: var(--text3);
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.1s;
  flex-shrink: 0;
}
.add-card-btn:hover { background: var(--surface); color: var(--text2); }
.add-col-btn {
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: var(--radius-lg);
  width: 200px;
  min-width: 200px;
  height: 56px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text3);
  font-family: inherit;
  transition: all 0.1s;
  flex-shrink: 0;
  align-self: flex-start;
}
.add-col-btn:hover { background: var(--surface); border-style: solid; color: var(--text2); }
.col.drag-over { border-color: var(--border2); background: #eae7e0; }
[data-theme="dark"] .col.drag-over { background: #2e2d33; }
.card-drop-indicator {
  height: 3px;
  background: var(--accent);
  border-radius: 2px;
  margin: 0 2px;
  opacity: 0;
  transition: opacity 0.1s;
  pointer-events: none;
}
.card-drop-indicator.active { opacity: 1; }
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  width: 520px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}
.modal-header h2 { font-size: 15px; font-weight: 600; flex: 1; }
.modal-close {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--text3);
  padding: 3px 7px;
  border-radius: 4px;
  line-height: 1;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
.field input,
.field textarea,
.field select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.1s;
}
.field input:focus,
.field textarea:focus,
.field select:focus {
  outline: none;
  border-color: #888;
}
.field textarea { resize: vertical; min-height: 110px; line-height: 1.5; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}
.modal-footer-right { display: flex; gap: 8px; }
.settings-section-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--surface2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 5px;
}
.list-item input {
  flex: 1;
  background: none;
  border: none;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  padding: 0;
}
.list-item input:focus { outline: none; }
.empty-board {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 60px 40px;
  color: var(--text3);
  font-size: 13px;
  text-align: center;
  flex: 1;
}
</style>
</head>
<body>

<div class="topbar">
  <h1>Tasks</h1>
  <div class="spacer"></div>
  <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
  <button onclick="openSettings()">Manage</button>
  <button onclick="exportCSV()">Export CSV</button>
  <button onclick="openTextExport()">Export Text</button>
  <button onclick="exportJSON()">Export JSON</button>
  <button onclick="importJSONClick()">Import JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  <button class="btn-primary" onclick="openNewCard()">+ New task</button>
</div>

<div class="cat-bar" id="catBar"></div>
<div class="board" id="board"></div>

<!-- Card modal -->
<div class="overlay" id="cardOverlay" onclick="overlayClick(event,'cardOverlay',closeCard)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New task</h2>
      <button class="modal-close" onclick="closeCard()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="Task title">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="fDesc" placeholder="Notes, details, links, anything…"></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Category</label>
          <select id="fCat"></select>
        </div>
        <div class="field">
          <label>Stage</label>
          <select id="fStage"></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="fDate">
        </div>
        <div class="field">
          <label>Hours spent</label>
          <input type="number" id="fHours" min="0" step="0.5" placeholder="0">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Start date</label>
          <input type="datetime-local" id="fStartDate">
        </div>
        <div class="field">
          <label>Done date</label>
          <input type="datetime-local" id="fDoneDate">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Due date</label>
          <input type="datetime-local" id="fDueDate">
        </div>
        <div class="field"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="deleteBtn" onclick="deleteCard()" style="display:none">Delete task</button>
      <div class="modal-footer-right">
        <button onclick="closeCard()">Cancel</button>
        <button class="btn-primary" onclick="saveCard()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="overlay" id="settingsOverlay" onclick="overlayClick(event,'settingsOverlay',closeSettings)">
  <div class="modal">
    <div class="modal-header">
      <h2>Manage</h2>
      <button class="modal-close" onclick="closeSettings()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px">
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.4px">Name</label>
            <input type="text" id="settingsName" placeholder="e.g. John" style="padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface)">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.4px">Daily lookback (days)</label>
            <input type="number" id="settingsLookback" min="1" max="30" step="1" placeholder="1" style="padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface)">
          </div>
        </div>
      </div>
      <div>
        <div class="settings-section-title">
          <span>Categories</span>
          <button onclick="addCategory()" style="font-size:12px;padding:3px 10px">+ Add</button>
        </div>
        <div id="catList"></div>
      </div>
      <div>
        <div class="settings-section-title">
          <span>Stages</span>
          <button onclick="addStage()" style="font-size:12px;padding:3px 10px">+ Add</button>
        </div>
        <div id="stageList"></div>
      </div>
      <div>
        <div class="settings-section-title"><span>Storage</span></div>
        <div id="storageInfo" style="font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;flex-direction:column;gap:6px">
          <span style="color:var(--text3)">Loading…</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div></div>
      <div class="modal-footer-right">
        <button onclick="closeSettings()">Cancel</button>
        <button class="btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Text export modal -->
<div class="overlay" id="textExportOverlay" onclick="overlayClick(event,'textExportOverlay',closeTextExport)">
  <div class="modal">
    <div class="modal-header">
      <h2>Daily export</h2>
      <button class="modal-close" onclick="closeTextExport()">&#10005;</button>
    </div>
    <div class="modal-body">
      <textarea id="textExportContent" style="width:100%;min-height:260px;font-family:monospace;font-size:13px;line-height:1.6;resize:vertical;padding:10px;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);background:var(--surface)" readonly></textarea>
    </div>
    <div class="modal-footer">
      <div></div>
      <div class="modal-footer-right">
        <button onclick="closeTextExport()">Close</button>
        <button class="btn-primary" id="copyBtn" onclick="copyTextExport()">Copy to clipboard</button>
      </div>
    </div>
  </div>
</div>

<!-- Hours prompt modal -->
<div class="overlay" id="hoursPromptOverlay">
  <div class="modal" style="width:340px">
    <div class="modal-header">
      <h2>Log hours</h2>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Hours spent on <span id="hoursPromptTitle" style="color:var(--text);font-style:normal"></span></label>
        <input type="number" id="hoursPromptInput" min="0" step="0.5" placeholder="0">
      </div>
    </div>
    <div class="modal-footer">
      <div></div>
      <div class="modal-footer-right">
        <button onclick="hoursPromptSkip()">Skip</button>
        <button class="btn-primary" onclick="hoursPromptConfirm()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const DB_NAME = 'kanban_db';
const DB_VERSION = 1;
const STORE_NAME = 'state';
const STATE_KEY = 'main';

let db = null;
let state = null;
let editingCardId = null;
let activeCat = null;
let dragCard = null;
let hoursPromptCallback = null;
let autoScrollRAF = null;
let autoScrollTarget = null;
let autoScrollDir = 0;

const DEFAULT_STATE = {
  name: '',
  exportLookback: 1,
  categories: [
    {name:'Personal', is_daily:true}, 
    {name:'Work',     is_daily:true}, 
  ],
  stages: [
    {name:'Backlog',      is_start:false, is_done:false},
    {name:'In Progress',  is_start:true,  is_done:false},
    {name:'Review',       is_start:false, is_done:false},
    {name:'Done',         is_start:false, is_done:true}
  ],
  cards: []
};

// ── IndexedDB ────────────────────────────────────────────────────────────────

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE_NAME);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror  = e => reject(e.target.error);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror  = e => reject(e.target.error);
  });
}

function dbPut(key, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const req = tx.objectStore(STORE_NAME).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror  = e => reject(e.target.error);
  });
}

async function save() {
  await dbPut(STATE_KEY, state);
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function localISO() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
    'T' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function localDate() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function getActiveCat() {
  if (!activeCat || !state.categories.includes(activeCat)) {
    activeCat = state.categories[0] || null;
  }
  return activeCat;
}


// ── Hours prompt ─────────────────────────────────────────────────────────────

function promptHours(cardTitle, callback) {
  document.getElementById('hoursPromptTitle').textContent = '"' + cardTitle + '"';
  document.getElementById('hoursPromptInput').value = '';
  hoursPromptCallback = callback;
  document.getElementById('hoursPromptOverlay').classList.add('open');
  setTimeout(() => document.getElementById('hoursPromptInput').focus(), 50);
}

function hoursPromptConfirm() {
  const val = document.getElementById('hoursPromptInput').value;
  document.getElementById('hoursPromptOverlay').classList.remove('open');
  if (hoursPromptCallback) hoursPromptCallback(val || null);
  hoursPromptCallback = null;
}

function hoursPromptSkip() {
  document.getElementById('hoursPromptOverlay').classList.remove('open');
  if (hoursPromptCallback) hoursPromptCallback(null);
  hoursPromptCallback = null;
}


function applyDragMove(card, newStage, newCat, stageObj, afterApply) {
  // afterApply is called after state mutation (and optional hours prompt) → save+render
  const prevStage = card.stage;
  const prevCat   = card.category;
  const isCross   = prevStage !== newStage || prevCat !== newCat;
  card.stage    = newStage;
  card.category = newCat;
  const now = localISO();
  if (prevStage !== newStage) {
    if (stageObj.is_start) card.startDate = now;
    if (stageObj.is_done)  card.doneDate  = now;
  }
  if (isCross) reseq(prevCat, prevStage);

  if (stageObj.is_done && prevStage !== newStage) {
    promptHours(card.title || 'Untitled', hours => {
      if (hours !== null) card.hours = hours;
      afterApply();
    });
  } else {
    afterApply();
  }
}


// ── Auto-scroll ───────────────────────────────────────────────────────────────

function startAutoScroll(el, dir) {
  if (autoScrollTarget === el && autoScrollDir === dir) return;
  stopAutoScroll();
  autoScrollTarget = el;
  autoScrollDir = dir;
  const tick = () => {
    if (!autoScrollTarget) return;
    autoScrollTarget.scrollTop += autoScrollDir * 8;
    autoScrollRAF = requestAnimationFrame(tick);
  };
  autoScrollRAF = requestAnimationFrame(tick);
}

function stopAutoScroll() {
  if (autoScrollRAF) cancelAnimationFrame(autoScrollRAF);
  autoScrollRAF = null;
  autoScrollTarget = null;
  autoScrollDir = 0;
}

// ── Sequence helpers ─────────────────────────────────────────────────────────

function nextSeq(category, stage) {
  const bucket = state.cards.filter(c => c.category === category && c.stage === stage);
  return bucket.length ? Math.max(...bucket.map(c => c.seq || 0)) + 1 : 1;
}

function reseq(category, stage) {
  // Re-assign sequential integers 1,2,3… to cards in a bucket, preserving current order
  const bucket = state.cards
    .filter(c => c.category === category && c.stage === stage)
    .sort((a, b) => (a.seq || 0) - (b.seq || 0));
  bucket.forEach((card, i) => { card.seq = i + 1; });
}

// ── Render ───────────────────────────────────────────────────────────────────

function render() {
  renderCatBar();
  renderBoard();
}

function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = '';
  const cat = getActiveCat();
  state.categories.forEach(c => {
    const t = document.createElement('button');
    t.className = 'cat-tab' + (c === cat ? ' active' : '');
    t.textContent = c.name;
    t.onclick = () => { activeCat = c; render(); };
    bar.appendChild(t);
  });
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const cat = getActiveCat();

  if (!cat) {
    board.innerHTML = '<div class="empty-board"><p style="font-size:15px;font-weight:500;color:#888">No categories</p><p>Click Manage to add one.</p></div>';
    return;
  }

  state.stages.forEach(stageObj => {
    const stage = stageObj.name;
    // Sort cards by seq for this bucket
    const cards = state.cards
      .filter(c => c.category === cat.name && c.stage === stage)
      .sort((a, b) => (a.seq || 0) - (b.seq || 0));

    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.stage = stage;

    // ── Column-level dragover/dragleave/drop (cross-column, drop on empty space) ──
    col.addEventListener('dragover', e => {
      e.preventDefault();
      // Only activate col highlight when dragging over header/empty area outside cardList
      if (!cardList.contains(e.target)) {
        col.classList.add('drag-over');
      }
    });
    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over');
        clearIndicators(col);
        stopAutoScroll();
      }
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      clearIndicators(col);
      stopAutoScroll();
      // Only handle drops that land on col itself (empty col / header area)
      // cardList handles all drops when there are cards
      if (!dragCard || e.target.closest('.cards')) return;
      const card = dragCard;
      const prevStage = card.stage;
      const prevCat   = card.category;
      if (prevStage !== stage || prevCat !== cat.name) {
        card.seq = nextSeq(cat.name, stage);
        applyDragMove(card, stage, cat.name, stageObj, () => save().then(render));
      } else {
        card.seq = nextSeq(cat.name, stage) + 1;
        reseq(cat.name, stage);
        save().then(render);
      }
    });

    // ── Header ──────────────────────────────────────────────────────────────
    const hdr = document.createElement('div');
    hdr.className = 'col-header';

    const title = document.createElement('div');
    title.className = 'col-title';
    title.contentEditable = true;
    title.textContent = stage;
    title.spellcheck = false;
    title.addEventListener('blur', () => {
      const nv = title.textContent.trim();
      if (nv && nv !== stage) {
        const idx = state.stages.findIndex(s => s.name === stage);
        if (idx > -1) {
          state.cards.forEach(c => { if (c.stage === stage) c.stage = nv; });
          state.stages[idx].name = nv;
          save().then(render);
        }
      } else if (!nv) {
        title.textContent = stage;
      }
    });
    title.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); title.blur(); }
    });

    const count = document.createElement('span');
    count.className = 'col-count';
    count.textContent = cards.length;

    const addBtn = document.createElement('button');
    addBtn.className = 'add-card-btn';
    addBtn.textContent = '+ Add';
    addBtn.onclick = () => openNewCard(stage);

    const del = document.createElement('button');
    del.className = 'col-del';
    del.innerHTML = '&#10005;';
    del.title = 'Delete stage';
    del.onclick = () => {
      const hasCards = state.cards.some(c => c.stage === stage);
      if (hasCards) {
        if (!confirm('Delete stage "' + stage + '"? Tasks in it will be moved to the first remaining stage.')) return;
        const fallback = state.stages.find(s => s.name !== stage);
        state.cards.forEach(c => { if (c.stage === stage) c.stage = fallback ? fallback.name : ''; });
      }
      state.stages = state.stages.filter(s => s.name !== stage);
      save().then(render);
    };

    hdr.appendChild(title);
    hdr.appendChild(count);
    hdr.appendChild(addBtn);
    hdr.appendChild(del);
    col.appendChild(hdr);

    // ── Card list ────────────────────────────────────────────────────────────
    const cardList = document.createElement('div');
    cardList.className = 'cards';

    // Leading indicator (before first card)
    cardList.appendChild(makeIndicator(cat, stage, null, stageObj));

    cards.forEach(card => {
      const el = document.createElement('div');
      el.className = 'card';
      el.draggable = true;
      el.dataset.cardId = card.id;

      el.addEventListener('dragstart', e => {
        dragCard = card;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => {
          el.classList.add('dragging');
          // Mark ALL cardLists so pointer-events pass through cards
          document.querySelectorAll('.cards').forEach(cl => cl.classList.add('is-dragging'));
        }, 0);
      });
      el.addEventListener('dragend', () => {
        dragCard = null;
        el.classList.remove('dragging');
        document.querySelectorAll('.cards').forEach(cl => cl.classList.remove('is-dragging'));
        clearIndicators(col);
        col.classList.remove('drag-over');
        stopAutoScroll();
      });





      const t = document.createElement('div');
      t.className = 'card-title';
      t.textContent = card.title || 'Untitled';
      el.appendChild(t);

      if (card.description) {
        const dp = document.createElement('div');
        dp.className = 'card-desc-preview';
        dp.textContent = card.description;
        el.appendChild(dp);
      }

      const meta = document.createElement('div');
      meta.className = 'card-meta';
      if (card.date) {
        const ds = document.createElement('span');
        ds.textContent = '📅 ' + card.date;
        meta.appendChild(ds);
      }
      if (card.hours) {
        const hs = document.createElement('span');
        hs.textContent = '⏱ ' + card.hours + 'h';
        meta.appendChild(hs);
      }
      if (card.dueDate) {
        const dd = document.createElement('span');
        dd.className = 'due-date';
        const due = new Date(card.dueDate);
        const now = new Date();
        if (stageObj.is_done) {
          dd.classList.add('done');
        } else if (due < now) {
          dd.classList.add('overdue');
        } else if (due - now <= 24 * 60 * 60 * 1000) {
          dd.classList.add('soon');
        }
        const pad = n => String(n).padStart(2,'0');
        const fmt = due.getFullYear() + '-' + pad(due.getMonth()+1) + '-' + pad(due.getDate()) +
                    ' ' + pad(due.getHours()) + ':' + pad(due.getMinutes());
        dd.textContent = '⏰ ' + fmt;
        meta.appendChild(dd);
      }
      if (meta.children.length) el.appendChild(meta);

      el.onclick = () => openEditCard(card.id);
      cardList.appendChild(el);

      // Indicator after each card
      cardList.appendChild(makeIndicator(cat, stage, card, stageObj));
    });

    // ── cardList-level dragover: handles indicator + auto-scroll ───────────────
    cardList.addEventListener('dragover', e => {
      e.preventDefault();
      col.classList.remove('drag-over');

      // Auto-scroll near edges
      const listRect = cardList.getBoundingClientRect();
      const EDGE = 48;
      if (e.clientY < listRect.top + EDGE) {
        startAutoScroll(cardList, -1);
      } else if (e.clientY > listRect.bottom - EDGE) {
        startAutoScroll(cardList, 1);
      } else {
        stopAutoScroll();
      }

      // Find which indicator to activate based on cursor position
      clearIndicators(col);
      const indicators = Array.from(cardList.querySelectorAll('.card-drop-indicator'));
      const cards = Array.from(cardList.querySelectorAll('.card'));

      if (cards.length === 0) {
        if (indicators[0]) indicators[0].classList.add('active');
        return;
      }

      // Find the card the cursor is over or between
      let placed = false;
      for (let i = 0; i < cards.length; i++) {
        const rect = cards[i].getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        if (e.clientY <= mid) {
          // Before card i → indicator i (there's one indicator before each card)
          if (indicators[i]) indicators[i].classList.add('active');
          placed = true;
          break;
        }
      }
      if (!placed) {
        // After last card
        if (indicators[indicators.length - 1]) indicators[indicators.length - 1].classList.add('active');
      }
    });

    cardList.addEventListener('dragleave', e => {
      if (!cardList.contains(e.relatedTarget)) {
        stopAutoScroll();
        clearIndicators(col);
      }
    });

    cardList.addEventListener('drop', e => {
      e.preventDefault();
      document.querySelectorAll('.cards').forEach(cl => cl.classList.remove('is-dragging'));
      col.classList.remove('drag-over');
      stopAutoScroll();
      if (!dragCard) return;

      // Find the active indicator to determine insertion point
      const indicators = Array.from(cardList.querySelectorAll('.card-drop-indicator'));
      const activeIdx = indicators.findIndex(ind => ind.classList.contains('active'));
      clearIndicators(col);

      const moving = dragCard;
      const prevStage = moving.stage;
      const prevCat   = moving.category;

      const doReorder = () => {
        // Build sorted bucket without the moving card
        let bucket = state.cards
          .filter(card => card.category === cat && card.stage === stage && card.id !== moving.id)
          .sort((a, b) => (a.seq || 0) - (b.seq || 0));

        // indicators[0] = before card 0, indicators[1] = after card 0 / before card 1, etc.
        // activeIdx directly maps to the insertion index in the bucket
        const insertIdx = activeIdx < 0 ? bucket.length : Math.min(activeIdx, bucket.length);
        bucket.splice(insertIdx, 0, moving);
        bucket.forEach((card, i) => { card.seq = i + 1; });
        save().then(render);
      };

      if (prevStage !== stage || prevCat !== cat) {
        applyDragMove(moving, stage, cat, stageObj, doReorder);
      } else {
        doReorder();
      }
    });

    col.appendChild(cardList);
    board.appendChild(col);
  });

  const addCol = document.createElement('button');
  addCol.className = 'add-col-btn';
  addCol.textContent = '+ Add stage';
  addCol.onclick = addStageInline;
  board.appendChild(addCol);
}

function makeIndicator(cat, stage, afterCard, stageObj) {
  const ind = document.createElement('div');
  ind.className = 'card-drop-indicator';
  ind.addEventListener('dragover', e => { e.preventDefault(); });

  return ind;
}

function clearIndicators(col) {
  col.querySelectorAll('.card-drop-indicator').forEach(el => el.classList.remove('active'));
}

function openEditCard(id) {
  const card = state.cards.find(c => c.id === id);

  editingCardId = id;
  document.getElementById('modalTitle').textContent = 'Edit task';
  document.getElementById('fTitle').value = card.title || '';

  document.getElementById('fDate').value = card.date || '';

  document.getElementById('fStartDate').value = card.startDate ? card.startDate.slice(0,16) : '';
  document.getElementById('fDoneDate').value = card.doneDate ? card.doneDate.slice(0,16) : '';
  document.getElementById('fDueDate').value = card.dueDate ? card.dueDate.slice(0,16) : '';
  document.getElementById('deleteBtn').style.display = 'inline-block';

function populateCardSelects(cat, stage) {
  const catSel = document.getElementById('fCat');
  catSel.innerHTML = '';
  state.categories.forEach(c => {
    const o = document.createElement('option');
    o.value = c.name; o.textContent = c.name;
    if (c === cat) o.selected = true;
    catSel.appendChild(o);
  });
  const stageSel = document.getElementById('fStage');
  stageSel.innerHTML = '';
  state.stages.forEach(s => {
    const o = document.createElement('option');
    o.value = s.name; o.textContent = s.name;
    if (s.name === stage) o.selected = true;
    stageSel.appendChild(o);
  });
}

async function saveCard() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }
  const newStage = document.getElementById('fStage').value;
  const stageObj = state.stages.find(s => s.name === newStage) || {};
  const data = {
    title,
    description: document.getElementById('fDesc').value.trim(),
    category: document.getElementById('fCat').value,
    stage: newStage,
    date: document.getElementById('fDate').value,
    hours: document.getElementById('fHours').value,
    startDate: document.getElementById('fStartDate').value || '',
    doneDate: document.getElementById('fDoneDate').value || '',
    dueDate: document.getElementById('fDueDate').value || ''
  };
  if (editingCardId) {
    const idx = state.cards.findIndex(c => c.id === editingCardId);
    if (idx > -1) {
      const prev = state.cards[idx];
      if (prev.stage !== newStage || prev.category !== data.category) {
        const now = localISO();
        if (stageObj.is_start && !data.startDate) data.startDate = now;
        if (stageObj.is_done && !data.doneDate) data.doneDate = now;
        data.seq = nextSeq(data.category, newStage);
        state.cards[idx] = { ...prev, ...data };
        reseq(prev.category, prev.stage);
        closeCard();
        if (stageObj.is_done && prev.stage !== newStage) {
          promptHours(data.title, hours => {
            if (hours !== null) state.cards[idx].hours = hours;
            save().then(render);
          });
        } else {
          await save();
          render();
        }
        return;
      } else {
        state.cards[idx] = { ...prev, ...data };
      }
    }
  } else {
    const now = localISO();
    if (stageObj.is_start && !data.startDate) data.startDate = now;
    if (stageObj.is_done && !data.doneDate) data.doneDate = now;
    data.seq = nextSeq(data.category, data.stage);
    state.cards.push({ id: uid(), createdAt: now, ...data });
    if (stageObj.is_done) {
      const newCard = state.cards[state.cards.length - 1];
      closeCard();
      promptHours(data.title, hours => {
        if (hours !== null) newCard.hours = hours;
        save().then(render);
      });
      return;
    }
  }
  await save();
  closeCard();
  render();
}

async function deleteCard() {
  if (!editingCardId) return;
  if (!confirm('Delete this task?')) return;
  state.cards = state.cards.filter(c => c.id !== editingCardId);
  await save();
  closeCard();
  render();
}

function closeCard() {
  document.getElementById('cardOverlay').classList.remove('open');
  editingCardId = null;
}

async function renderStorageInfo() {
  const el = document.getElementById('storageInfo');
  if (!el) return;
  try {
    if (!navigator.storage || !navigator.storage.estimate) {
      el.innerHTML = '<span style="color:var(--text3)">Storage API not available in this browser.</span>';
      return;
    }
    const { usage, quota } = await navigator.storage.estimate();
    const fmt = b => {
      if (b === undefined || b === null) return 'N/A';
      if (b < 1024) return b + ' B';
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      if (b < 1024 * 1024 * 1024) return (b / (1024 * 1024)).toFixed(2) + ' MB';
      return (b / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    };
    const pct = quota ? ((usage / quota) * 100).toFixed(2) : null;
    const barWidth = pct ? Math.min(100, parseFloat(pct)) : 0;
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between">
        <span>Used</span><span style="color:var(--text);font-weight:500">${fmt(usage)}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span>Quota</span><span style="color:var(--text);font-weight:500">${fmt(quota)}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span>Usage</span><span style="color:var(--text);font-weight:500">${pct !== null ? pct + '%' : 'N/A'}</span>
      </div>
      <div style="background:var(--border);border-radius:4px;height:6px;margin-top:2px;overflow:hidden">
        <div style="background:var(--accent);height:100%;width:${barWidth}%;border-radius:4px;transition:width 0.3s"></div>
      </div>
    `;
  } catch(err) {
    el.innerHTML = '<span style="color:var(--text3)">Could not read storage info: ' + err.message + '</span>';
  }
}

  });

  const sl = document.getElementById('stageList');
  sl.innerHTML = '';
  state.stages.forEach((s, i) => {
    const row = document.createElement('div');

    row.style.flexWrap = 'wrap';

    const inp = document.createElement('input');

    inp.dataset.idx = i;

    const del = document.createElement('button');
    del.className = 'btn-danger';
    del.style.cssText = 'font-size:11px;padding:2px 8px;flex-shrink:0';
    del.textContent = 'Remove';
    del.onclick = () => {
      if (state.cards.some(card => card.stage === s.name)) {
        if (!confirm('Remove stage "' + s.name + '"? Tasks in it will be moved to the first remaining stage.')) return;
        const fallback = state.stages.find(st => st.name !== s.name);
        state.cards.forEach(card => { if (card.stage === s.name) card.stage = fallback ? fallback.name : ''; });
      }
      state.stages.splice(i, 1);
      save().then(renderSettingsPanel);
    };

    row.appendChild(inp);
    row.appendChild(makeToggle('Start', 'is_start', s, i));
    row.appendChild(makeToggle('Done', 'is_done', s, i));
    row.appendChild(del);
    sl.appendChild(row);
  });
}

function addCategory() {
  state.categories.push({name:'New Category', is_daily:true});
  save().then(renderSettingsPanel);
  setTimeout(() => {
    const inputs = document.querySelectorAll('#catList input');
    const last = inputs[inputs.length - 1];
    if (last) { last.focus(); last.select(); }
  }, 0);
}

function addStage() {
  state.stages.push({name:'New Stage', is_start:false, is_done:false});
  save().then(renderSettingsPanel);
  setTimeout(() => {
    const inputs = document.querySelectorAll('#stageList input:not([type="checkbox"])');
    const last = inputs[inputs.length - 1];
    if (last) { last.focus(); last.select(); }
  }, 0);
}

function addStageInline() {
  const name = prompt('Stage name:');
  if (!name || !name.trim()) return;
  state.stages.push({name: name.trim(), is_start:false, is_done:false});
  save().then(render);
}

async function saveSettings() {
  state.name = document.getElementById('settingsName').value.trim();
  state.exportLookback = Math.max(1, parseInt(document.getElementById('settingsLookback').value) || 1);

  const catRows = document.querySelectorAll('#catList .list-item');
  const newCats = [];
  catRows.forEach((row, i) => {
    const inp = row.querySelector('input:not([type="checkbox"])');
    const nv = inp ? inp.value.trim() : '';
    const old = state.categories[i];
    if (nv && old && nv !== old.name) {
      state.cards.forEach(c => { if (c.category === old.name) c.category = nv; });
      if (activeCat === old) activeCat = nv;
    }
    const dailyChk = row.querySelector('input[data-field="is_daily"]');
    if (nv) newCats.push({
      name: nv,
      is_daily: dailyChk ? dailyChk.checked : false,
    });
  });
  state.categories = newCats;

  const stageRows = document.querySelectorAll('#stageList .list-item');
  const newStages = [];
  stageRows.forEach((row, i) => {
    const inp = row.querySelector('input:not([type="checkbox"])');
    const nv = inp ? inp.value.trim() : '';
    const old = state.stages[i];
    if (nv && old && nv !== old.name) {
      state.cards.forEach(c => { if (c.stage === old.name) c.stage = nv; });
    }
    const startChk = row.querySelector('input[data-field="is_start"]');
    const doneChk  = row.querySelector('input[data-field="is_done"]');
    if (nv) newStages.push({
      name: nv,
      is_start: startChk ? startChk.checked : false,
      is_done:  doneChk  ? doneChk.checked  : false
    });
  });
  state.stages = newStages;

  if (!state.categories.includes(activeCat)) activeCat = state.categories[0] || null;
  await save();
  closeSettings();
  render();
}

// ── Exports / Import ─────────────────────────────────────────────────────────

function exportCSV() {
  const headers = ['Title', 'Description', 'Category', 'Stage', 'Date', 'Hours', 'Start date', 'Done date', 'Due date', 'Created'];
  const rows = state.cards.map(c => [
    c.title || '',
    c.description || '',
    c.category || '',
    c.stage || '',
    c.date || '',
    c.hours || '',
    c.startDate || '',
    c.doneDate || '',
    c.dueDate || '',
    c.createdAt ? c.createdAt.slice(0, 10) : ''
  ].map(v => '"' + String(v).replace(/"/g, '""') + '"'));
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'tasks_' + localDate() + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function openTextExport() {
  const now = new Date();
  const lookback = state.exportLookback !== undefined ? state.exportLookback : 1;
  const dayOffset = now.getDay() === 1 ? 3 : lookback;
  const yesterdayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dayOffset, 0, 1, 0);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const formattedDate = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
  const nameStr = state.name ? state.name + ' ' : '';
  const lines = ['Daily ' + nameStr + formattedDate + ':'];
  state.categories.forEach(cat => {
    const catCards = state.cards.filter(c => c.category === cat.name);
    if (!catCards.length) return;
    if (!cat.is_daily) return;
    lines.push('*' + cat.name + '*');
    state.stages.forEach(stageObj => {
      let stageCards = catCards.filter(c => c.stage === stageObj.name);
      if (stageObj.is_done) {
        stageCards = stageCards.filter(c => {
          if (!c.doneDate) return false;
          const d = new Date(c.doneDate);
          return d >= yesterdayStart && d <= now;
        });
      }
      if (!stageCards.length) return;
      lines.push('*' + stageObj.name + '*');
      stageCards.forEach(c => lines.push('- ' + (c.title || 'Untitled')));
    });
  });
  document.getElementById('textExportContent').value = lines.join('\n');
  document.getElementById('copyBtn').textContent = 'Copy to clipboard';
  document.getElementById('textExportOverlay').classList.add('open');
}

function closeTextExport() {
  document.getElementById('textExportOverlay').classList.remove('open');
}

function copyTextExport() {
  const text = document.getElementById('textExportContent').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
  }).catch(() => {
    document.getElementById('textExportContent').select();
    document.execCommand('copy');
  });
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'tasks_' + localDate() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSONClick() {
  document.getElementById('importFile').value = '';
  document.getElementById('importFile').click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!parsed.categories || !parsed.stages || !parsed.cards) {
        alert('Invalid file: missing categories, stages, or cards.');
        return;
      }
      if (!confirm('This will replace all current data. Continue?')) return;
      state = parsed;
      activeCat = state.categories[0] || null;
      await save();
      render();
    } catch(err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ── Init ─────────────────────────────────────────────────────────────────────


function toggleDark() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('kanban_theme', next);
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('darkToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
}

document.getElementById('hoursPromptInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') hoursPromptConfirm();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCard(); closeSettings(); closeTextExport(); hoursPromptSkip(); }
});

openDB().then(async database => {
  db = database;
  const stored = await dbGet(STATE_KEY);
  state = stored || JSON.parse(JSON.stringify(DEFAULT_STATE));
  activeCat = state.categories[0] || null;
  render();
  applyTheme(localStorage.getItem('kanban_theme') || 'light');
}).catch(err => {
  console.error('IndexedDB failed, falling back to in-memory state:', err);
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  // patch save() to no-op so the app still works
  window.save = () => Promise.resolve();
  activeCat = state.categories[0] || null;
  render();
  applyTheme(localStorage.getItem('kanban_theme') || 'light');
});
</script>
